<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
   
</head>
<body>
    <!--login page-->
    <div class="login-container"> 
        
        <div class="login-form">
            <div class="login-header">
             <h1>Register</h1>
            </div>
         <!-- Form for login -->
         <form class="form-list">
            <div class="input-block">
               
                 <input type="email" placeholder="Email" class="email-input allinput">
                  <img src="email.png" alt="@"class="input-logo email-logo" > 
            </div>
             <div class="input-block">
                   
                    <input type="text" placeholder="Username" class="username-input allinput">
                     <img src="username.png" alt="pass"class="input-logo" >
            </div>
             
               <div class="input-block">
                     
                      <input type="password" placeholder="Password" class="password-input allinput">
                       <img src="password.png" alt="pass"class="input-logo" >
                </div>
               
            <div class="forget">
                <div>
                   <input type="checkbox" id="remember-me">
                   <label for="remember-me">Remember Me</label>
                </div>
                   <span class="error-message">
                      <a href="#">Forgot Password?</a>
                   </span>
           </div>
          <!-- Register Button -->
          <div class="reg-field">
               <button  type="button"  class="login-btn login-btn1">Register</button>
               <button type="button" class="login-btn login-btn2">Login</button>     
          </div>
         </form>
        </div>
    </div>
     <script src="login.js"></script>
</body>
</html>
